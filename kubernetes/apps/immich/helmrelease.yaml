apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: immich
  namespace: flux-system
spec:
  interval: 5m
  url: oci://ghcr.io/immich-app/immich-charts/immich
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 10m

  chartRef:
    kind: OCIRepository
    name: immich
    namespace: flux-system
values:
  immich:
    persistence:
      library:
        existingClaim: immich-library

  image:
    tag: v1.140.1

  redis:
    enabled: true

  env:
    DB_HOSTNAME: immich-postgres
    DB_USERNAME: immich
    DB_PASSWORD: immichpassword
    DB_DATABASE_NAME: immich
